<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SylvaLab Admin — Lab Kehutanan Unsulbar</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<!-- Tambahkan penanganan error jika GSAP gagal dimuat -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" onerror="window.gsapError = true;"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        forest: '#0a2615',
        deep: '#0f381e',
        emerald: '#1b5e20',
        leaf: '#4caf50',
        neon: '#00e676',
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Serif+Display&display=swap');
  body {
    font-family: 'DM Sans', sans-serif;
    background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1920&q=80');
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    color: white;
    min-height: 100vh;
  }
  .glass {
    background: rgba(10, 38, 21, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .glass-light {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  /* Sidebar nav item */
  .nav-item { transition: all .2s; cursor: pointer; }
  .nav-item:hover, .nav-item.active {
    background: rgba(0,230,118,.12);
    border-left-color: #00e676;
    color: #00e676;
  }
  /* Table rows */
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: rgba(255,255,255,.04); }
  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: -120%;
    transition: right .4s cubic-bezier(.68,-.55,.265,1.55);
    z-index: 9999;
  }
  .toast.show { right: 24px; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,230,118,.3); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,230,118,.6); }
  /* Modal */
  .modal-backdrop { background: rgba(0,0,0,.6); backdrop-filter: blur(6px); }
  /* Form input */
  input, select, textarea {
    background: rgba(255,255,255,.07) !important;
    border: 1px solid rgba(255,255,255,.15) !important;
    color: white !important;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: rgba(0,230,118,.5) !important;
    box-shadow: 0 0 0 3px rgba(0,230,118,.1) !important;
  }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,.3) !important; }
  select option { background: #0f381e; color: white; }
</style>
</head>
<body>

<!-- ── TOAST ── -->
<div id="toast" class="toast glass rounded-2xl p-4 flex items-center gap-3 border-l-4 border-neon max-w-sm shadow-2xl mx-4 sm:mx-0">
  <i id="toast-icon" class="fa-solid fa-check-circle text-neon text-xl flex-shrink-0"></i>
  <div><h4 id="toast-title" class="font-semibold text-sm">Berhasil</h4><p id="toast-msg" class="text-xs text-gray-300 mt-0.5">—</p></div>
</div>

<!-- ── MODAL KONFIRMASI ── -->
<div id="modal" class="fixed inset-0 modal-backdrop z-[100] hidden items-center justify-center p-4">
  <div class="glass rounded-2xl p-7 w-full max-w-sm shadow-2xl transform scale-95 transition-transform" id="modal-box">
    <div id="modal-icon" class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl mb-4"></div>
    <h3 id="modal-title" class="text-lg font-semibold mb-2">Konfirmasi</h3>
    <p id="modal-msg" class="text-sm text-gray-300 mb-6 leading-relaxed">Yakin?</p>
    <div class="flex gap-3 justify-end">
      <button onclick="closeModal()" class="px-4 py-2 rounded-lg glass-light text-sm hover:bg-white/10 transition">Batal</button>
      <button id="modal-confirm" onclick="confirmAction()" class="px-4 py-2 rounded-lg text-sm font-medium transition">Lanjutkan</button>
    </div>
  </div>
</div>

<!-- ── MODAL FORM ALAT ── -->
<div id="modal-alat" class="fixed inset-0 modal-backdrop z-[100] hidden items-center justify-center p-4">
  <div class="glass rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-6 sticky top-0">
      <h3 id="modal-alat-title" class="text-lg font-semibold">Tambah Alat</h3>
      <button onclick="closeModalAlat()" class="w-8 h-8 rounded-lg glass-light text-gray-400 hover:text-white flex items-center justify-center transition">✕</button>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
      <div class="sm:col-span-2">
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Nama Alat *</label>
        <input id="fa-nama" type="text" class="w-full h-10 rounded-lg px-3 text-sm" placeholder="Kompas Brunton">
      </div>
      <div>
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Kategori</label>
        <select id="fa-kat" class="w-full h-10 rounded-lg px-3 text-sm">
          <option>Laboratorium</option><option>Elektronika</option>
          <option>Pengukuran</option><option>Navigasi</option><option>Umum</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Jumlah Stok *</label>
        <input id="fa-stok" type="number" min="1" class="w-full h-10 rounded-lg px-3 text-sm" placeholder="10">
      </div>
      <div class="sm:col-span-2">
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">URL Foto (opsional)</label>
        <input id="fa-foto" type="text" class="w-full h-10 rounded-lg px-3 text-sm" placeholder="https://images.unsplash.com/...">
      </div>
    </div>
    <input type="hidden" id="fa-id">
    <div class="flex gap-3 justify-end">
      <button onclick="closeModalAlat()" class="px-4 py-2 rounded-lg glass-light text-sm hover:bg-white/10 transition">Batal</button>
      <button onclick="submitAlat()" class="px-5 py-2 rounded-lg bg-neon text-forest text-sm font-semibold hover:bg-green-300 transition" id="fa-submit">Simpan</button>
    </div>
  </div>
</div>

<!-- ── MODAL FORM USER ── -->
<div id="modal-user" class="fixed inset-0 modal-backdrop z-[100] hidden items-center justify-center p-4">
  <div class="glass rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-lg font-semibold">Tambah Pengguna</h3>
      <button onclick="closeModalUser()" class="w-8 h-8 rounded-lg glass-light text-gray-400 hover:text-white flex items-center justify-center transition">✕</button>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
      <div>
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">NIM / NIP *</label>
        <input id="fu-nim" type="text" class="w-full h-10 rounded-lg px-3 text-sm" placeholder="D0521001">
      </div>
      <div>
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Nama Lengkap *</label>
        <input id="fu-nama" type="text" class="w-full h-10 rounded-lg px-3 text-sm" placeholder="Andi Pratama">
      </div>
      <div>
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Role</label>
        <select id="fu-role" class="w-full h-10 rounded-lg px-3 text-sm">
          <option>PEMINJAM</option><option>ADMIN</option><option>SUPER_ADMIN</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Password</label>
        <input id="fu-pass" type="text" class="w-full h-10 rounded-lg px-3 text-sm" placeholder="12345 (default)">
      </div>
    </div>
    <div class="flex gap-3 justify-end">
      <button onclick="closeModalUser()" class="px-4 py-2 rounded-lg glass-light text-sm hover:bg-white/10 transition">Batal</button>
      <button onclick="submitUser()" class="px-5 py-2 rounded-lg bg-neon text-forest text-sm font-semibold hover:bg-green-300 transition">Simpan</button>
    </div>
  </div>
</div>

<!-- ── MODAL ARTIKEL ── -->
<div id="modal-art" class="fixed inset-0 modal-backdrop z-[100] hidden items-center justify-center p-4">
  <div class="glass rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-lg font-semibold">Tulis Artikel</h3>
      <button onclick="closeModalArt()" class="w-8 h-8 rounded-lg glass-light text-gray-400 hover:text-white flex items-center justify-center transition">✕</button>
    </div>
    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Judul *</label>
        <input id="art-judul" type="text" class="w-full h-10 rounded-lg px-3 text-sm" placeholder="Ekspedisi Hutan Mangrove 2025">
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Tanggal</label>
          <input id="art-tgl" type="date" class="w-full h-10 rounded-lg px-3 text-sm">
        </div>
        <div>
          <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">URL Cover</label>
          <input id="art-cover" type="text" class="w-full h-10 rounded-lg px-3 text-sm" placeholder="https://...">
        </div>
      </div>
      <div>
        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Isi Artikel *</label>
        <textarea id="art-konten" rows="5" class="w-full rounded-lg px-3 py-2 text-sm resize-none" placeholder="Tuliskan isi artikel di sini..."></textarea>
      </div>
    </div>
    <div class="flex gap-3 justify-end">
      <button onclick="closeModalArt()" class="px-4 py-2 rounded-lg glass-light text-sm hover:bg-white/10 transition">Batal</button>
      <button onclick="submitArtikel()" class="px-5 py-2 rounded-lg bg-neon text-forest text-sm font-semibold hover:bg-green-300 transition">Publikasikan</button>
    </div>
  </div>
</div>

<!-- ── LAYOUT ── -->
<div class="flex h-screen overflow-hidden relative">

  <!-- ── SIDEBAR OVERLAY (MOBILE) ── -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity" onclick="closeSidebar()"></div>

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar" class="glass w-64 flex-shrink-0 flex flex-col overflow-y-auto fixed inset-y-0 left-0 z-50 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl lg:shadow-none">
    
    <!-- Brand -->
    <div class="p-5 border-b border-white/10 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-neon/20 border border-neon/30 flex items-center justify-center">
          <i class="fa-solid fa-leaf text-neon"></i>
        </div>
        <div>
          <div class="font-semibold text-sm tracking-wide">SylvaLab</div>
          <div class="text-[10px] text-gray-400 tracking-widest">ADMIN PANEL</div>
        </div>
      </div>
      <!-- Close Btn Mobile -->
      <button onclick="closeSidebar()" class="lg:hidden text-gray-400 hover:text-white w-8 h-8 rounded-lg glass-light flex items-center justify-center">✕</button>
    </div>

    <!-- Admin info -->
    <div class="p-4 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-neon/20 border border-neon/30 flex items-center justify-center text-neon font-bold text-sm" id="sb-avatar">—</div>
        <div class="overflow-hidden">
          <div class="text-sm font-semibold truncate text-white" id="sb-name">Memuat...</div>
          <div class="text-xs text-gray-400" id="sb-role">—</div>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 p-3 space-y-1">
      <div class="text-[10px] text-gray-500 uppercase tracking-widest px-3 py-2 mt-1 font-semibold">Utama</div>
      <button id="nav-dashboard" onclick="showPage('dashboard',this)" class="nav-item active w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 border-l-2 border-transparent font-medium">
        <i class="fa-solid fa-chart-pie w-4 text-center"></i> Ringkasan
      </button>
      <button id="nav-permohonan" onclick="showPage('permohonan',this)" class="nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 border-l-2 border-transparent font-medium">
        <i class="fa-regular fa-bell w-4 text-center"></i> Permohonan
        <span class="ml-auto bg-yellow-500/20 text-yellow-300 text-[10px] font-bold px-2 py-0.5 rounded-full border border-yellow-500/30" id="badge-pending">0</span>
      </button>
      <button id="nav-berjalan" onclick="showPage('berjalan',this)" class="nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 border-l-2 border-transparent font-medium">
        <i class="fa-solid fa-rotate w-4 text-center"></i> Sedang Dipinjam
      </button>

      <div class="text-[10px] text-gray-500 uppercase tracking-widest px-3 py-2 mt-3 font-semibold">Master Data</div>
      <button id="nav-alat" onclick="showPage('alat',this)" class="nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 border-l-2 border-transparent font-medium">
        <i class="fa-solid fa-toolbox w-4 text-center"></i> Inventaris Alat
      </button>
      <button id="nav-users" onclick="showPage('users',this)" class="nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 border-l-2 border-transparent font-medium" style="display:none">
        <i class="fa-solid fa-users w-4 text-center"></i> Pengguna
      </button>

      <div class="text-[10px] text-gray-500 uppercase tracking-widest px-3 py-2 mt-3 font-semibold">Konten</div>
      <button id="nav-artikel" onclick="showPage('artikel',this)" class="nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 border-l-2 border-transparent font-medium">
        <i class="fa-regular fa-newspaper w-4 text-center"></i> Jurnal Kanopi
      </button>
      <button onclick="bukaKatalog()" class="nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 border-l-2 border-transparent text-gray-400 font-medium">
        <i class="fa-solid fa-arrow-up-right-from-square w-4 text-center"></i> Lihat Katalog
      </button>
    </nav>

    <!-- Logout -->
    <div class="p-3 border-t border-white/10">
      <button onclick="logout()" class="w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 text-gray-400 hover:text-red-300 hover:bg-red-500/10 transition border-l-2 border-transparent font-medium">
        <i class="fa-solid fa-right-from-bracket w-4 text-center"></i> Keluar
      </button>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ── -->
  <div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">

    <!-- Top bar -->
    <div class="glass sticky top-0 z-30 px-4 lg:px-6 py-3 flex items-center justify-between border-b border-white/10 shadow-sm flex-shrink-0">
      <div class="flex items-center gap-3">
        <!-- Hamburger Menu Button -->
        <button onclick="openSidebar()" class="lg:hidden w-9 h-9 flex items-center justify-center rounded-lg glass-light text-gray-300 hover:text-white transition focus:outline-none focus:ring-1 focus:ring-neon">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h2 class="font-semibold text-sm tracking-wide" id="topbar-title">Ringkasan</h2>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-[11px] sm:text-xs text-gray-400 font-medium hidden sm:block" id="topbar-time">—</span>
        <button onclick="loadAll()" class="glass-light px-3 py-1.5 rounded-lg text-xs flex items-center gap-2 hover:bg-white/10 transition font-medium">
          <i class="fa-solid fa-rotate-right"></i> <span class="hidden sm:inline">Muat Ulang</span>
        </button>
      </div>
    </div>
